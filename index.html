<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Визитница — Главная</title>
  <link rel="stylesheet" href="index.css" media="not (max-width: 768px)" />
  <script>
    // Проверяем User-Agent на мобильные устройства
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if(isMobile) {
  // Добавляем класс к body
  document.documentElement.classList.add('mobile-device');
  // Подключаем мобильный CSS
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'indexmobile.css';
  document.head.appendChild(link);
}
</script>
</head>
<body>
  <div id="mainContainer">
    <div class="header">
      <h1 class="page-title">Список услуг</h1>
      <!-- Google Вход — ВНЕ блока authButtons -->
      
      <!-- Остальные кнопки -->
      <div class="auth-container">
  <div id="googleAuthBtn"></div>  <!-- Вход (через Google) -->
  <button id="logoutBtn" class="btn hidden">ВЫХОД</button>
  <button id="adminBtn" class="btn hidden">Админка</button>
</div>

<div id="actionButtons" class="auth-buttons">
  <button id="addServiceBtn" class="btn">Добавить услугу</button>
  <button id="cabinetBtn" class="btn hidden">Личный кабинет</button>
</div>

      <div id="roleInfo" style="margin-top: 10px; font-weight: bold; color: #2c3e50;"></div>
    </div>
  </div>

  <div class="filters-container">
    <div class="filter-row">
      <input
        type="text"
        id="filterRegion"
        list="listRegion"
        placeholder="Область"
        autocomplete="off"
      />
      <datalist id="listRegion"></datalist>

      <input
        type="text"
        id="filterCity"
        list="listCity"
        placeholder="Населённый пункт"
        autocomplete="off"
      />
      <datalist id="listCity"></datalist>
    </div>

    <div class="filter-row">
      <input
        type="text"
        id="filterProfile"
        list="listProfile"
        placeholder="Профиль"
        autocomplete="off"
      />
      <datalist id="listProfile"></datalist>

      <input
        type="text"
        id="filterType"
        list="listType"
        placeholder="Вид деятельности"
        autocomplete="off"
      />
      <datalist id="listType"></datalist>
    </div>

    <div class="filter-row">
      <input
        type="text"
        id="filterDistrict"
        list="listDistrict"
        placeholder="Район"
        autocomplete="off"
      />
      <datalist id="listDistrict"></datalist>

      <input
        type="text"
        id="filterName"
        list="listName"
        placeholder="Имя или Компания"
        autocomplete="off"
      />
      <datalist id="listName"></datalist>
    </div>

    <button onclick="applyFilters()" class="btn search-btn">Поиск</button>
  </div>

  <p id="searchCount" class="search-count"></p>

  <div id="cards"></div>

  <div id="notification" class="notification"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="index.js"></script>
</body>
</html>
