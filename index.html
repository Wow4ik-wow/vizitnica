<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Визитница — Главная</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="mainContainer">
      <div class="header">
        <h1 class="page-title">Список услуг</h1>
        <!-- Google Вход — ВНЕ блока authButtons -->
<div id="g_id_onload"
     data-client_id="1060687932793-sk24egn7c7r0h6t6i1dedk4u6hrgdotc.apps.googleusercontent.com"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-shape="rectangular"
     data-theme="outline"
     data-text="signin_with"
     data-size="large"
     data-logo_alignment="left">
</div>

<!-- Остальные кнопки -->
<div id="authButtons" class="auth-buttons">
  <button id="logoutBtn" class="btn hidden">Выход</button>
  <button id="addServiceBtn" class="btn">Добавить услугу</button>
  <button id="cabinetBtn" class="btn hidden">Личный кабинет</button>
  <button id="adminBtn" class="btn hidden">Админка</button>
</div>

        </div>
      </div>

      <div class="filters-container">
        <div class="filter-row">
          <input
            type="text"
            id="filterRegion"
            list="listRegion"
            placeholder="Область"
            autocomplete="off"
          />
          <datalist id="listRegion"></datalist>

          <input
            type="text"
            id="filterCity"
            list="listCity"
            placeholder="Населённый пункт"
            autocomplete="off"
          />
          <datalist id="listCity"></datalist>
        </div>

        <div class="filter-row">
          <input
            type="text"
            id="filterProfile"
            list="listProfile"
            placeholder="Профиль"
            autocomplete="off"
          />
          <datalist id="listProfile"></datalist>

          <input
            type="text"
            id="filterType"
            list="listType"
            placeholder="Вид деятельности"
            autocomplete="off"
          />
          <datalist id="listType"></datalist>
        </div>

        <div class="filter-row">
          <input
            type="text"
            id="filterDistrict"
            list="listDistrict"
            placeholder="Район"
            autocomplete="off"
          />
          <datalist id="listDistrict"></datalist>

          <input
            type="text"
            id="filterName"
            list="listName"
            placeholder="Имя или Компания"
            autocomplete="off"
          />
          <datalist id="listName"></datalist>
        </div>

        <button onclick="applyFilters()" class="btn search-btn">Поиск</button>
      </div>

      <p id="searchCount" class="search-count"></p>

      <div id="cards"></div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="index.js"></script>
  </body>
</html>
